<html>
    <head>
        <title>NatoTatoSHC Rewards</title>
        <style>
            header {
                text-align: center;
            }
            #ptheader {
                height: 100px;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr 1fr;
                grid-template-rows: 1fr;
            }
            #points {
                font-size: 2rem;
                text-align: center;
            }
            .redeem-item {
                width: 100%;
                height: fit-content;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                place-items: center;
                border: 1px solid black;
                img {
                    grid-column: 1;
                    grid-row: 1 / span 3;
                    height: 100px;
                }
                h2 {
                    grid-column: 2 / span 4;
                    grid-row: 1;
                }
                p {
                    grid-column: 2;
                    grid-row: 2;
                }
                button {
                    grid-column: 3;
                    grid-row: 2;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <h1 id="name">NatoTatoSHC Rewards</h1>
        </header>
        <div id="ptheader">
            <div>
                <p id="points"></p>
            </div>
        </div>
        <div id="earn">
            <h2>Earn</h2>
            <h3>Enter Code For Points</h3>
            <input type="text" autocomplete="off" id="redeem-code"><button onclick="code();">Redeem</button>
        </div>
        <div id="redeem">
            <h2>Redeem</h2>
            <div id="cl" class="redeem-item"><img src="https://natotatoshc.github.io/QuantumClicker/src/quantum.png"><h2><select><option value="1000">1,000</option><option value="5000">5,000</option><option value="10000">10,000</option></select>Units</h2><p>Price: 10:1,000</p><button onclick="qpurchase('clicks', 'cl', .01)">Redeem</button></div>
            <div id="c" class="redeem-item"><img src="https://natotatoshc.github.io/QuantumClicker/src/cursor.png"><h2><select><option value="10">10</option><option value="50">50</option><option value="100">100</option></select>Cursors</h2><p>Price: 2000:10</p><button onclick="qpurchase('cursors', 'c', 200)">Redeem</button></div>
            <div id="h" class="redeem-item"><img src="https://natotatoshc.github.io/QuantumClicker/src/dam.png"><h2><select><option value="10">10</option><option value="50">50</option><option value="100">100</option></select>Dams</h2><p>Price: 4000:10</p><button onclick="qpurchase('dams', 'h', 400)">Redeem</button></div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script>
            let ptsd = {};
            let users = [];
            let codes = {};
            let client = supabase.createClient("https://ywsbaxwlytkjkzhyfzqr.supabase.co", "sb_publishable_C6rZSBHWegX7bzcsv7OGFg_PgJkqTC0");
            async function aCh() {
                let info1 = await client.from("reward-accounts").select("*");
                info1.data.forEach(dati => {
                    users.push(dati.username);
                });
            }
            if (localStorage.getItem("login") == undefined) {
                location.assign("./login.html");
            }
            const locData = JSON.parse(localStorage.getItem("login"));
            let psscorrect = false;
            async function check() {
                let {data, error} = await client.from("reward-accounts").select("*").eq("username", locData.username);
                data.forEach(dati => {
                    if (dati.password != locData.password) {
                        location.assign("./login.html");
                    }
                });
                await aCh();
                if (!users.includes(JSON.parse(localStorage.getItem("login")).username)) {
                    location.assign("./login.html");
                }
            }
            check();

            async function code() {
                if (!ptsd.redeemed) {
                    ptsd.redeemed = [];
                }
                pushAmount();
                let redeemed = [];
                let tcode = document.getElementById("redeem-code").value;
                redeemed = ptsd.redeemed;
                document.getElementById("redeem-code").value = "";
                if (Object.keys(codes).includes(tcode)) {
                    if (!ptsd.redeemed.includes(tcode)) {
                        ptsd.redeemed.push(tcode);
                        ptsd.points += codes[tcode];
                    }
                }
            }

            async function pullAmount() {
                let {data, e} = await client.from("reward-accounts").select("*").eq("username", "codes");
                data.forEach(dati => {
                    codes = dati.data;
                });
                let info = await client.from("reward-accounts").select("*").eq("username", locData.username);
                info.data.forEach(dati => {
                    ptsd = dati.data;
                    document.querySelector("#points").textContent = dati.data.points+"pts";
                });
            }
            async function pushAmount() {
                await client.from("reward-accounts").update([{data:ptsd}]).eq("username", locData.username);
                pullAmount();
            }
            async function qpurchase(vari, amount, price) {
                if (ptsd.points >= Number(document.getElementById(amount).querySelector("h2").querySelector("select").value) * price) {
                    ptsd.points -= Number(document.getElementById(amount).querySelector("h2").querySelector("select").value) * price;
                    pushAmount();
                    let code = Math.round(Math.random()*100000);
                    alert("Code: "+code);
                    await client.from("quantum-rewards").insert([{code:code,var:vari,amount:Number(document.getElementById(amount).querySelector("h2").querySelector("select").value),security_verify:locData.username}]);
                }
            }
            pullAmount();
        </script>
    </body>
</html>
